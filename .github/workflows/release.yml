name: Release mdbook-quiz

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # ---- Rust → TS bindings ----
      - name: Generate TypeScript bindings
        run: cargo test -p mdbook-quiz-schema --features ts export_bindings

      - name: Copy generated bindings
        run: |
          mkdir -p js/packages/quiz/src/bindings
          cp crates/mdbook-quiz-schema/bindings/* js/packages/quiz/src/bindings/

      # ---- JS build (pnpm via corepack) ----
      - name: Install JS dependencies
        working-directory: js
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install

      - name: Build quiz frontend
        working-directory: js/packages/quiz
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm exec tsc
          cp src/lib.scss dist

      - name: Build quiz embed frontend
        working-directory: js/packages/quiz-embed
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm exec vite build

      # ---- Rust binary ----
      - name: Build release binary (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl -p mdbook-quiz

      # ---- Package ----
      - name: Prepare dist
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/mdbook-quiz dist/mdbook-quiz-linux
          cd dist
          tar -czf mdbook-quiz-linux.tar.gz mdbook-quiz-linux
          sha256sum mdbook-quiz-linux > mdbook-quiz-linux_sha256sum.txt
          sha256sum mdbook-quiz-linux.tar.gz > mdbook-quiz-linux.tar.gz_sha256sum.txt

      # ---- Release ----
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mdbook-quiz-linux
            dist/mdbook-quiz-linux.tar.gz
            dist/mdbook-quiz-linux_sha256sum.txt
            dist/mdbook-quiz-linux.tar.gz_sha256sum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move latest tag to this release
        uses: EndBug/latest-tag@latest
        with:
          ref: latest
